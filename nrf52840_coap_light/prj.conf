# ── Networking ───────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV6_NBR_CACHE=n
CONFIG_NET_IPV6_MLD=n

# ── OpenThread (Minimal Thread Device = lower power than FTD) ────────────────
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_MTD_SED=y          # Sleepy End Device: radio off between polls
CONFIG_OPENTHREAD_POLL_PERIOD=5000   # ms – wake parent every 5 s to check mail
CONFIG_OPENTHREAD_MANUAL_START=n
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=3072

# ── CoAP ─────────────────────────────────────────────────────────────────────
CONFIG_COAP=y
CONFIG_COAP_LOG_LEVEL_WRN=y

# ── GPIO / Buttons / LEDs ────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# ── Power Management ──────────────────────────────────────────────────────────
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# ── System ───────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y
CONFIG_ASSERT=y

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3           # INFO
CONFIG_OPENTHREAD_LOG_LEVEL_WARNING=y
CONFIG_NET_LOG=n

# ── Stack / heap ─────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
